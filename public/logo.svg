<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="grad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0.6"/>
    </linearGradient>
  </defs>
  <!-- Wallet body -->
  <rect x="30" y="55" width="120" height="90" rx="16" stroke="url(#grad)" stroke-width="6" fill="none"/>
  <!-- Wallet flap -->
  <path d="M30 80 L30 65 Q30 49 46 49 L140 49 Q150 49 150 59 L150 72" stroke="url(#grad)" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- Card slot accent -->
  <rect x="110" y="85" width="40" height="28" rx="8" fill="url(#grad)" opacity="0.2"/>
  <circle cx="130" cy="99" r="6" fill="url(#grad)"/>
  <!-- Chart bars rising from wallet -->
  <rect x="50" y="100" width="10" height="25" rx="3" fill="url(#grad)" opacity="0.5"/>
  <rect x="66" y="88" width="10" height="37" rx="3" fill="url(#grad)" opacity="0.7"/>
  <rect x="82" y="76" width="10" height="49" rx="3" fill="url(#grad)" opacity="0.9"/>
  <!-- AI sparkle top-right -->
  <g transform="translate(155, 35)">
    <path d="M0 -14 L3 -3 L14 0 L3 3 L0 14 L-3 3 L-14 0 L-3 -3 Z" fill="url(#grad)"/>
  </g>
  <!-- Small sparkle -->
  <g transform="translate(170, 65)">
    <path d="M0 -7 L1.5 -1.5 L7 0 L1.5 1.5 L0 7 L-1.5 1.5 L-7 0 L-1.5 -1.5 Z" fill="#06B6D4" opacity="0.7"/>
  </g>
  <!-- Small sparkle left -->
  <g transform="translate(22, 42)">
    <path d="M0 -6 L1.2 -1.2 L6 0 L1.2 1.2 L0 6 L-1.2 1.2 L-6 0 L-1.2 -1.2 Z" fill="#7C3AED" opacity="0.6"/>
  </g>
</svg>
