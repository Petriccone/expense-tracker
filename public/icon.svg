<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f1e"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="accent2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>
  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Subtle border glow -->
  <rect x="4" y="4" width="504" height="504" rx="104" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.3"/>
  <!-- Wallet body -->
  <rect x="110" y="175" width="240" height="180" rx="32" stroke="url(#accent)" stroke-width="12" fill="none"/>
  <!-- Wallet flap -->
  <path d="M110 220 L110 195 Q110 163 142 163 L320 163 Q340 163 340 183 L340 210" stroke="url(#accent)" stroke-width="12" fill="none" stroke-linecap="round"/>
  <!-- Card slot -->
  <rect x="290" y="235" width="60" height="50" rx="14" fill="url(#accent)" opacity="0.15"/>
  <circle cx="320" cy="260" r="10" fill="url(#accent)"/>
  <!-- Chart bars -->
  <rect x="145" y="290" width="20" height="45" rx="6" fill="url(#accent)" opacity="0.45"/>
  <rect x="175" y="265" width="20" height="70" rx="6" fill="url(#accent)" opacity="0.65"/>
  <rect x="205" y="240" width="20" height="95" rx="6" fill="url(#accent)" opacity="0.85"/>
  <rect x="235" y="255" width="20" height="80" rx="6" fill="url(#accent)" opacity="0.75"/>
  <!-- AI sparkle top-right -->
  <g transform="translate(390, 115)">
    <path d="M0 -28 L6 -6 L28 0 L6 6 L0 28 L-6 6 L-28 0 L-6 -6 Z" fill="url(#accent)"/>
  </g>
  <!-- Small sparkle -->
  <g transform="translate(415, 170)">
    <path d="M0 -13 L2.8 -2.8 L13 0 L2.8 2.8 L0 13 L-2.8 2.8 L-13 0 L-2.8 -2.8 Z" fill="#06B6D4" opacity="0.6"/>
  </g>
  <!-- Small sparkle left -->
  <g transform="translate(90, 135)">
    <path d="M0 -11 L2.2 -2.2 L11 0 L2.2 2.2 L0 11 L-2.2 2.2 L-11 0 L-2.2 -2.2 Z" fill="#7C3AED" opacity="0.5"/>
  </g>
</svg>
